server:
  port: ${SERVER_PORT:18080}

spring:
  application:
    name: research-paper-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paper_agent}
    username: ${SPRING_DATASOURCE_USERNAME:paper_agent}
    password: ${SPRING_DATASOURCE_PASSWORD:paper_agent_password}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:disabled}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

paper-agent:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:10080}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:paperagent}
    secret-key: ${MINIO_SECRET_KEY:paperagent_password}
    bucket: ${MINIO_BUCKET:paper-pdfs}
  ai:
    provider: ${AI_PROVIDER:fallback}
