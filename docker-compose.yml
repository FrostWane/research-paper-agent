services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: paper-agent-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paper_agent}
      POSTGRES_USER: ${POSTGRES_USER:-paper_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paper_agent_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paper_agent} -d ${POSTGRES_DB:-paper_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: paper-agent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-paperagent}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-paperagent_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: paper-agent-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-paper_agent}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-paper_agent}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-paper_agent_password}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:15173,http://127.0.0.1:15173}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-paperagent}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-paperagent_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-paper-pdfs}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-at-least-32-characters}
      AI_PROVIDER: ${AI_PROVIDER:-fallback}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-disabled}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "18080:18080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18080}
    container_name: paper-agent-frontend
    depends_on:
      - backend
    ports:
      - "15173:80"

volumes:
  postgres-data:
  minio-data:
